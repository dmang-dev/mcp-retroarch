name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Type-check & build
        run: npm run build

      - name: Verify shebang and bin
        shell: bash
        run: |
          head -1 dist/index.js | grep -q '^#!/usr/bin/env node$'
          test -f dist/index.js
          test -f dist/retroarch.js
          test -f dist/tools.js
          echo "build artifacts OK"

  ci-ok:
    name: ci-ok
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Verify all matrix builds passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "matrix build did not fully succeed: ${{ needs.build.result }}"
            exit 1
          fi
          echo "all matrix builds passed"
